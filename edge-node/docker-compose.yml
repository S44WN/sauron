services:
  edge-node:
    build: .
    container_name: sauron-edge-node
    restart: unless-stopped
    environment:
      - RUST_LOG=info
      # Default: use RTSP stream. Set your camera URL here.
      # - CAMERA_SOURCE=rtsp://192.168.1.100:554/stream
    # Uncomment for webcam passthrough (Linux host only):
    # devices:
    #   - /dev/video0:/dev/video0
    network_mode: host
